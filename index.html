<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikSave - Video Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TikSave</h1>
        <p>Paste the TikTok link below to get the video</p>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/@user/video/...">
            <button id="downloadBtn">Get Video</button>
        </div>

        <div id="loader" class="hidden">Processing...</div>
        
        <div id="result" class="hidden">
            <p>Video Ready!</p>
            <a id="saveLink" href="#" target="_blank" download>Download Now</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
